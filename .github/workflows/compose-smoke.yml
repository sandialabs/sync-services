name: Compose Smoke Test

on:
  pull_request:
    branches: [ "**" ]
  push:
    branches: [ "**" ]

concurrency:
  group: "compose-smoke-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run compose smoke test
        env:
          SECRET: ci-smoke-secret
          PORT: "8192"
        run: ./tests/local-compose.sh smoke
